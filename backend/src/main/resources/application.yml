server:
  # 0.0.0.0: 모든 네트워크 인터페이스에서 접근 허용 (실제 기기 테스트 시 필요)
  # localhost: PC에서만 접근 가능 (에뮬레이터 사용 시)
  address: 0.0.0.0
  port: 8080

spring:
  cloud:
    aws:
      credentials:
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_KEY}
      s3:
        bucket: ${S3_BUCKET_NAME}
      region:
        static: ap-northeast-2
      stack:
        auto: false

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus