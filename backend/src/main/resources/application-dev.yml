spring:
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

app:
  cors:
    allowed-origins: http://localhost:8081
  oauth:
    redirect-base-url: http://localhost:8080
